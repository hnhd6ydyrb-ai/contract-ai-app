<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI 계약서 해석</title>
</head>
<body>

<h1>AI 계약서 해석</h1>

<textarea
  id="contract"
  rows="15"
  cols="80"
  placeholder="계약서를 입력하세요"
></textarea>

<br><br>

<button onclick="analyze()">
  분석하기
</button>

<pre id="result"></pre>

<script>
async function analyze() {

  const text =
    document.getElementById("contract").value;

  const response = await fetch(
    "https://contract-ai-app-production.up.railway.app/analyze-contract",
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        contractText: text
      })
    }
  );

  const data = await response.json();

  document.getElementById("result").innerText =
    data.result;
}
</script>

</body>
</html>
